<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Waypoint — Trip Tracker</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0F1B2A" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="vendor/maplibre-gl.css" />
<!-- version queries are cache busters, stamped automatically by .github/workflows/stamp-version.yml on each deploy -->
<link rel="stylesheet" href="style.css?v=e9d99e63" />
</head>
<body>
<div id="app">

  <!-- ===== HOME ===== -->
  <div id="view-home" class="view active">
    <div class="topbar">
      <div class="wordmark">Waypoint<span class="dot"> · trips</span></div>
      <div class="topbar-actions">
        <button id="selectModeBtn" class="icon-btn">Select</button>
        <button id="menuBtn" class="icon-btn" aria-label="Menu">&#8943;</button>
      </div>
    </div>
    <div class="content">
      <div id="holidayList"></div>
      <div id="tripList"></div>
    </div>
    <button id="fabRecord" class="fab">&#9679; Record trip</button>
    <div id="selectActionsBar" class="select-actions" style="display:none;">
      <button id="bulkDeleteBtn" class="btn-ghost btn-danger-ghost" disabled>Delete</button>
      <button id="mergeBtn" class="btn-primary btn-teal" disabled>Merge (0)</button>
      <button id="fabCombine" class="btn-primary" disabled>Combine (0)</button>
    </div>
    <input type="file" id="homePhotoFileInput" accept="image/*" multiple style="display:none" />
    <input type="file" id="timelineFileInput" accept="application/json,.json" style="display:none" />
    <input type="file" id="restoreFileInput" accept="application/json,.json" style="display:none" />
  </div>

  <!-- ===== RECORD ===== -->
  <div id="view-record" class="view">
    <div class="topbar">
      <button id="recordBackBtn" class="back-btn">&#8592;</button>
      <div class="wordmark">Recording<span class="dot">&#8230;</span></div>
      <span style="width:20px"></span>
    </div>
    <div id="recordMap" class="map-area"></div>
    <div id="recordBanner" class="record-banner" role="status"></div>
    <div class="stat-strip">
      <div class="stat"><div class="stat-label">Elapsed</div><div class="stat-value" id="statElapsed">0:00</div></div>
      <div class="stat"><div class="stat-label">Distance</div><div class="stat-value" id="statDistance">0 m</div></div>
      <div class="stat"><div class="stat-label">Points</div><div class="stat-value" id="statPoints">0</div></div>
    </div>
    <div class="record-controls">
      <button id="stopRecordBtn" class="btn-stop">Stop &amp; save trip</button>
    </div>
  </div>

  <!-- ===== PLAYBACK ===== -->
  <div id="view-playback" class="view">
    <div class="topbar">
      <button id="playbackBackBtn" class="back-btn">&#8592;</button>
      <div class="wordmark" id="playbackTitle" style="color:var(--paper); text-transform:none; font-size:14px;">Trip</div>
      <div class="topbar-actions">
        <button id="exportGpxBtn" class="icon-btn">GPX</button>
        <button id="renameTripBtn" class="icon-btn">Rename</button>
        <button id="deleteTripBtn" class="icon-btn">Delete</button>
      </div>
    </div>
    <div id="playbackMap" class="map-area"></div>
    <div id="legBanner" class="leg-banner"></div>
    <div id="photoMemory" class="photo-memory">
      <div class="photo-memory-frame"><img id="photoMemoryImg" alt="Trip photo" /></div>
      <div id="photoMemoryDots" class="photo-memory-dots"></div>
      <div id="photoMemoryCaption" class="photo-memory-caption"></div>
    </div>
    <div class="playback-panel">
      <div id="playerPanel">
        <div class="readout">
          <span id="readoutClock">--:--</span>
          <span id="readoutDist">0 m</span>
          <span id="readoutSpeed">&#8212;</span>
          <span id="paceBadge" class="pace-badge"></span>
        </div>
        <div id="storyScrubber" class="story-scrubber"></div>
        <div class="playback-buttons">
          <button id="playToggle" class="play-toggle">&#9654;</button>
          <div class="speed-select">
            <button class="speed-btn" data-speed="0.5">&#189;&#215;</button>
            <button class="speed-btn active" data-speed="1">1&#215;</button>
            <button class="speed-btn" data-speed="2">2&#215;</button>
          </div>
          <button id="addPhotoBtn" class="icon-btn photo-btn">+ Photo</button>
        </div>
      </div>
      <div id="overviewPanel" style="display:none">
        <div class="overview-header">
          <button id="overviewPlayBtn" class="play-toggle">&#9654;</button>
          <div id="overviewStats" class="overview-stats"></div>
        </div>
        <div id="storylineStrip" class="storyline-strip"></div>
      </div>
    </div>
    <input type="file" id="photoFileInput" accept="image/*" multiple style="display:none" />
  </div>

  <!-- ===== TIMELINE: DATE RANGE ===== -->
  <div id="view-daterange" class="view">
    <div class="topbar">
      <button id="dateRangeBackBtn" class="back-btn">&#8592;</button>
      <div class="wordmark">Import Timeline</div>
      <span style="width:20px"></span>
    </div>
    <div class="content">
      <p class="import-hint">Your file covers <span id="timelineSpan"></span>. Pick a window to search for trips &#8212; smaller ranges load faster.</p>
      <label class="field-label" for="rangeStart">From</label>
      <input type="date" id="rangeStart" class="date-input" />
      <label class="field-label" for="rangeEnd">To</label>
      <input type="date" id="rangeEnd" class="date-input" />
      <button id="findTripsBtn" class="btn-primary" style="width:100%; margin-top:20px;">Find trips</button>
    </div>
  </div>

  <!-- ===== TIMELINE: CANDIDATE LIST ===== -->
  <div id="view-import-list" class="view">
    <div class="topbar">
      <button id="importListBackBtn" class="back-btn">&#8592;</button>
      <div class="wordmark">Select trips</div>
      <button id="selectAllBtn" class="icon-btn">Select all</button>
    </div>
    <div class="content">
      <div id="candidateList"></div>
    </div>
    <button id="importSelectedBtn" class="fab">Import selected (0)</button>
  </div>

  <!-- ===== LOADING ===== -->
  <div id="view-loading" class="view">
    <div class="loading-wrap">
      <div class="loading-glyph">&#9737;</div>
      <p id="loadingMessage">Working&#8230;</p>
    </div>
  </div>

</div>

<!-- ===== home menu sheet ===== -->
<div id="menuSheet" class="modal-backdrop">
  <div class="modal-sheet">
    <h2>Waypoint</h2>
    <div class="menu-list">
      <button id="menuAddPhotos" class="menu-item">Add photos<span class="menu-sub">match a batch to your trips by time &amp; place</span></button>
      <button id="menuImportTimeline" class="menu-item">Import Google Timeline<span class="menu-sub">turn your location history into trips</span></button>
      <button id="menuExportBackup" class="menu-item">Export backup<span class="menu-sub">everything &#8212; trips, holidays, photos &#8212; in one file</span></button>
      <button id="menuRestoreBackup" class="menu-item">Restore backup<span class="menu-sub">bring a backup file into this device</span></button>
    </div>
    <div class="modal-row">
      <button id="menuCloseBtn" class="btn-ghost">Close</button>
    </div>
  </div>
</div>

<!-- ===== holiday naming modal ===== -->
<div id="holidayNameModal" class="modal-backdrop">
  <div class="modal-sheet">
    <h2>Name this holiday</h2>
    <input type="text" id="holidayNameInput" placeholder="e.g. Italy 2026" />
    <div class="modal-row">
      <button id="cancelHolidayName" class="btn-ghost">Cancel</button>
      <button id="confirmHolidayName" class="btn-primary">Combine trips</button>
    </div>
  </div>
</div>

<!-- ===== merge naming modal ===== -->
<div id="mergeNameModal" class="modal-backdrop">
  <div class="modal-sheet">
    <h2>Name the merged trip</h2>
    <input type="text" id="mergeNameInput" placeholder="e.g. Coast drive" />
    <div class="modal-row">
      <button id="cancelMergeName" class="btn-ghost">Cancel</button>
      <button id="confirmMergeName" class="btn-primary">Merge trips</button>
    </div>
  </div>
</div>

<!-- ===== rename modal (trip or holiday) ===== -->
<div id="renameModal" class="modal-backdrop">
  <div class="modal-sheet">
    <h2 id="renameModalTitle">Rename</h2>
    <input type="text" id="renameInput" />
    <div class="modal-row">
      <button id="cancelRename" class="btn-ghost">Cancel</button>
      <button id="confirmRename" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- ===== photo moment sheet ===== -->
<div id="momentSheet" class="modal-backdrop">
  <div class="modal-sheet">
    <h2 id="momentSheetTitle">Moment</h2>
    <div id="momentGrid" class="moment-grid"></div>
    <div class="modal-row">
      <button id="momentCloseBtn" class="btn-ghost">Close</button>
      <button id="momentPlayBtn" class="btn-primary">Play from here</button>
    </div>
  </div>
</div>

<!-- ===== end-of-story summary ===== -->
<div id="summaryOverlay" class="modal-backdrop summary-overlay">
  <div class="modal-sheet summary-sheet">
    <div class="summary-glyph">&#9737;</div>
    <h2 id="summaryTitle">Trip</h2>
    <div id="summaryRoute" class="summary-route"></div>
    <div id="summaryStats" class="summary-stats"></div>
    <div class="modal-row">
      <button id="summaryReplayBtn" class="btn-ghost">Replay</button>
      <button id="summaryOverviewBtn" class="btn-primary">Overview</button>
    </div>
  </div>
</div>

<!-- ===== photo lightbox ===== -->
<div id="photoLightbox" class="modal-backdrop">
  <div class="modal-sheet lightbox-sheet">
    <img id="lightboxImg" alt="Trip photo" />
    <div id="lightboxMeta" class="lightbox-meta"></div>
    <div class="modal-row">
      <button id="lightboxDeleteBtn" class="btn-ghost">Delete photo</button>
      <button id="lightboxCloseBtn" class="btn-primary">Close</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="vendor/maplibre-gl.js"></script>
<script type="module" src="app.js?v=e9d99e63"></script>
</body>
</html>
