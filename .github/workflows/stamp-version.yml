# Stamps index.html's asset version queries (app.js?v=..., style.css?v=...) with the commit SHA
# on every push to main, so the page and its assets always deploy as a matched pair and a stale
# HTTP-cached script can never run against fresh markup. GitHub Pages then redeploys from the
# stamp commit. The [auto-stamp] marker stops the bot's own push from re-triggering the job.
name: Stamp asset versions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - app.js
      - style.css
      - index.html
      - sw.js

permissions:
  contents: write
  pages: write

jobs:
  stamp:
    if: ${{ !contains(github.event.head_commit.message, '[auto-stamp]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version queries with commit SHA
        run: |
          SHA="${GITHUB_SHA::8}"
          sed -i -E "s/(app\.js\?v=)[A-Za-z0-9]+/\1${SHA}/; s/(style\.css\?v=)[A-Za-z0-9]+/\1${SHA}/" index.html
          grep -n "?v=${SHA}" index.html

      - name: Commit and push if changed
        id: stamp
        run: |
          if git diff --quiet; then
            echo "Already stamped — nothing to do."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Stamp assets to ${GITHUB_SHA::8} [auto-stamp]"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes intentionally trigger no further builds, so the stamped commit would
      # never reach GitHub Pages on its own — request the Pages build explicitly. Retries cover
      # the platform's transient "try again later" rejections after rapid successive deploys.
      - name: Request Pages build of the stamped commit
        if: steps.stamp.outputs.pushed == 'true'
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds")
            echo "Attempt $i: HTTP $code"
            [ "$code" = "201" ] && exit 0
            sleep $((i * 30))
          done
          echo "Could not queue a Pages build after 5 attempts" >&2
          exit 1
